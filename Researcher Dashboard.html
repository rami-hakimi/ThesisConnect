<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ResearchBridge — Mockups</title>

  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#151a22;
      --muted:#667085;
      --line:#e6e8ee;
      --blue:#2f6fed;
      --blue-100:#eaf1ff;
      --green:#16a34a;
      --green-100:#eaf8ef;
      --orange:#f59e0b;
      --orange-100:#fff4d6;
      --red:#dc2626;
      --shadow: 0 10px 25px rgba(16,24,40,.08);
      --radius:16px;
      --radius-lg:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: var(--sans);
      color:var(--text);
      background:var(--bg);
    }

    .topbar{
      position: sticky;
      top:0;
      z-index: 10;
      background: rgba(245,246,248,.82);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width: 1200px;
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      letter-spacing:-.2px;
    }
    .logo{
      width:34px;height:34px;
      border-radius:10px;
      background: linear-gradient(135deg, var(--blue), #7aa5ff);
      box-shadow: 0 10px 20px rgba(47,111,237,.20);
    }
    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--card);
      font-size:14px;
      color:var(--muted);
    }
    .pill strong{ color:var(--text); font-weight:700; }
    .btn{
      border:1px solid var(--line);
      background:var(--card);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition:.15s ease;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn.primary{
      background:var(--blue);
      border-color:var(--blue);
      color:#fff;
    }

    .wrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
      display:grid;
      grid-template-columns: 260px 1fr;
      gap:18px;
    }
    @media (max-width: 980px){
      .wrap{ grid-template-columns: 1fr; }
      .sidebar{ position: static; }
    }

    .sidebar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 14px;
      position: sticky;
      top: 80px;
      height: fit-content;
    }
    .nav-title{
      font-size:12px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.12em;
      margin:6px 8px 10px;
    }
    .nav{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .nav button{
      width:100%;
      text-align:left;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid transparent;
      background:transparent;
      cursor:pointer;
      font-weight:700;
      color:var(--muted);
      transition:.15s ease;
    }
    .nav button:hover{ background:#f7f8fb; color:var(--text); }
    .nav button.active{
      background: var(--blue-100);
      color: var(--blue);
      border-color: rgba(47,111,237,.18);
    }

    .main{
      display:flex;
      flex-direction:column;
      gap:18px;
      min-width: 0;
    }
    .pagehead{
      background:var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
    }
    .pagehead h1{
      margin:0;
      font-size: 24px;
      letter-spacing:-.3px;
    }
    .pagehead p{
      margin:6px 0 0;
      color:var(--muted);
      line-height:1.45;
      max-width: 62ch;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:8px 10px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      border:1px solid transparent;
      white-space:nowrap;
    }
    .tag.approved{ background: var(--green-100); color: var(--green); border-color: rgba(22,163,74,.15); }
    .tag.flag{ background: var(--orange-100); color: #a16207; border-color: rgba(245,158,11,.20); }
    .tag.rejected{ background:#fee2e2; color: var(--red); border-color: rgba(220,38,38,.15); }

    /* Remaining CSS unchanged */
  </style>
</head>

<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>ResearchBridge</div>
    </div>

    <div class="actions">
      <div class="pill"><strong id="creditsVal">10</strong> Credits</div>
      <div class="pill">Earn credits by participating • Spend credits to recruit</div>
      <button class="btn" id="notifyBtn" type="button">🔔 Reminders</button>
      <button class="btn primary" id="primaryBtn" type="button">+ Create Study</button>
    </div>
  </div>
</div>

<!-- The rest of your HTML (all sections, scripts, etc.) remains exactly the same as your original code -->

</body>
</html>
